<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillUp Circle - Module View</title>
  <!-- Favicon / Browser Tab Logo -->
  <link rel="icon" type="image/jpeg" href="https://i.pinimg.com/736x/b5/ba/eb/b5baeb49d5e8dc8a107dbe2b1bfecc1c.jpg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen">

  <header class="sticky top-0 z-50 border-b border-slate-800/80 bg-slate-950/80 backdrop-blur-md px-4 sm:px-8 py-3.5 flex items-center justify-between">
    <a href="dashboard.html" class="flex items-center space-x-2 text-xs font-semibold text-slate-400 hover:text-white transition">
      <i class="fa-solid fa-arrow-left"></i> <span>Back to Dashboard</span>
    </a>
    <div class="flex items-center gap-2">
      <img src="https://i.pinimg.com/736x/b5/ba/eb/b5baeb49d5e8dc8a107dbe2b1bfecc1c.jpg" alt="SkillUp Logo" class="w-6 h-6 rounded-full object-cover">
      <span id="module-page-title" class="text-sm font-bold text-white uppercase tracking-wider">Course Module</span>
    </div>
  </header>

  <main class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8 space-y-6">

    <!-- ADMIN PUBLISHER -->
    <div id="admin-publisher" class="hidden bg-slate-900/90 border-2 border-dashed border-red-500/40 rounded-2xl p-6">
      <h3 class="text-xs font-bold text-red-400 uppercase tracking-wider mb-3"><i class="fa-solid fa-user-shield"></i> Admin Workspace — Publish Resource File</h3>
      <form onsubmit="publishAdminFile(event)" class="space-y-3">
        <input type="text" id="admin-doc-title" required placeholder="Resource Title (e.g., Official GATE Syllabus PDF)" class="w-full px-3.5 py-2 bg-slate-950 border border-slate-800 rounded-xl text-xs text-white">
        <input type="file" id="admin-doc-file" required class="w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-red-600 file:text-white hover:file:bg-red-500 cursor-pointer">
        <button type="submit" class="w-full py-2.5 bg-red-600 hover:bg-red-500 text-white font-bold text-xs rounded-xl transition">Publish File to Module</button>
      </form>
    </div>

    <!-- DYNAMIC MODULE CONTENT & BRANCH GATE SYLLABI -->
    <div id="module-content-area" class="space-y-6">
      <!-- Injected via app.js -->
    </div>

    <!-- PUBLISHED RESOURCES FILE LIST -->
    <div class="glass rounded-2xl p-6">
      <h4 class="text-sm font-semibold text-white mb-3"><i class="fa-solid fa-folder-open text-blue-400 mr-2"></i> Department Downloads & Uploaded Resources</h4>
      <div id="resources-list" class="space-y-2">
        <p class="text-xs text-slate-500 italic">No files uploaded for this module yet.</p>
      </div>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
