<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillUp Circle - Login & Register</title>
  <!-- Favicon / Browser Tab Logo -->
  <link rel="icon" type="image/jpeg" href="https://i.pinimg.com/736x/b5/ba/eb/b5baeb49d5e8dc8a107dbe2b1bfecc1c.jpg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-4xl glass rounded-3xl overflow-hidden shadow-2xl grid grid-cols-1 lg:grid-cols-2 border border-slate-800">
    
    <!-- Left Side: Container adjusted to fit image aspect ratio -->
    <div class="flex items-center justify-center bg-slate-950/40 p-6">
      <img src="https://i.pinimg.com/736x/35/87/70/35877031b0fcad716ba38a4845fa8de2.jpg" 
           alt="SkillUp Banner" 
           class="w-full h-auto max-h-[550px] object-contain rounded-2xl shadow-lg" />
    </div>

    <!-- Right Side: Form Area -->
    <div class="p-8 lg:p-10 flex flex-col justify-center bg-slate-900/90">
      
      <!-- SIGN IN FORM -->
      <div id="form-signin">
        <h2 class="text-2xl font-bold text-white mb-1">Sign In</h2>
        <p class="text-xs text-slate-400 mb-6">Enter your email and password to log in.</p>

        <form onsubmit="handleLogin(event)" class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-slate-300 mb-1" >Email Address</label>
            <input type="email" id="login-email" required placeholder="Enter your Email ID" class="w-full px-3.5 py-2.5 bg-slate-950 border border-slate-800 rounded-xl text-xs text-white focus:outline-none focus:border-blue-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-300 mb-1">Password</label>
            <input type="password" id="login-password" required placeholder="Enter your Password" class="w-full px-3.5 py-2.5 bg-slate-950 border border-slate-800 rounded-xl text-xs text-white focus:outline-none focus:border-blue-500">
          </div>
          <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-xl text-xs transition shadow-lg shadow-blue-600/20">
            Sign In to Portal
          </button>
        </form>



        <p class="text-xs text-slate-400 mt-6 text-center">
          Don't have an account? <button onclick="toggleAuth('signup')" class="text-blue-400 hover:underline font-semibold">Register</button>
        </p>
      </div>

      <!-- REGISTER FORM -->
      <div id="form-signup" class="hidden">
        <h2 class="text-2xl font-bold text-white mb-1">Create Student Account</h2>
        <p class="text-xs text-slate-400 mb-6">Register your student details below.</p>

        <form onsubmit="handleRegister(event)" class="space-y-3">
          <input type="text" id="reg-name" required placeholder="Full Name" class="w-full px-3.5 py-2 bg-slate-950 border border-slate-800 rounded-xl text-xs text-white focus:outline-none focus:border-blue-500">
          <input type="email" id="reg-email" required placeholder="Email Address" class="w-full px-3.5 py-2 bg-slate-950 border border-slate-800 rounded-xl text-xs text-white focus:outline-none focus:border-blue-500">
          <input type="text" id="reg-roll" required placeholder="Roll Number (e.g., 23MT1A3101)" class="w-full px-3.5 py-2 bg-slate-950 border border-slate-800 rounded-xl text-xs text-white focus:outline-none focus:border-blue-500">
          
          <div>
            <label class="block text-[11px] font-semibold text-slate-400 mb-1">Select Department / Branch</label>
            <select id="reg-branch" required class="w-full px-3.5 py-2 bg-slate-950 border border-slate-800 rounded-xl text-xs text-slate-200 focus:outline-none focus:border-blue-500 cursor-pointer">
              <option value="ece">Electronics and Communication Engineering (ECE)</option>
              <option value="electrical">Electrical Engineering (EEE)</option>
              <option value="aids">Artificial Intelligence & Data Science (AI & DS)</option>
              <option value="cs">Computer Science & Engineering (CS)</option>
              <option value="instrumentation">Instrumentation Engineering (IN)</option>
            </select>
          </div>

          <input type="password" required placeholder="Password" class="w-full px-3.5 py-2 bg-slate-950 border border-slate-800 rounded-xl text-xs text-white focus:outline-none focus:border-blue-500">
          <button type="submit" class="w-full py-2.5 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-xl text-xs transition shadow-lg shadow-blue-600/20">Register Student Account</button>
        </form>

        <p class="text-xs text-slate-400 mt-6 text-center">
          Already registered? <button onclick="toggleAuth('signin')" class="text-blue-400 hover:underline font-semibold">Sign In</button>
        </p>
      </div>

    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
